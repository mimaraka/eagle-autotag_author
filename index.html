<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1724;
        --card: rgba(255, 255, 255, 0.04);
        --glass: rgba(255, 255, 255, 0.06);
        --primary-1: #7c3aed;
        --primary-2: #06b6d4;
        --accent: #f59e0b;
        --radius: 14px;
        --shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(
            1200px 600px at 10% 10%,
            rgba(124, 58, 237, 0.12),
            transparent 8%
          ),
          radial-gradient(
            900px 500px at 90% 90%,
            rgba(6, 182, 212, 0.08),
            transparent 10%
          ),
          var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding: 32px;
      }

      .card {
        width: min(720px, 92vw);
        padding: 48px;
        border-radius: var(--radius);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px) saturate(120%);
        border: 1px solid rgba(255, 255, 255, 0.04);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #e6eef8;
        font-size: 20px;
      }

      p.lead {
        margin: 0;
        color: rgba(230, 238, 248, 0.75);
        font-size: 13px;
        text-align: center;
        max-width: 64ch;
      }

      input[type="text"] {
        width: 100%;
        max-width: 240px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        font-size: 15px;
        transition:
          border-color 0.2s,
          background 0.2s;
      }

      input[type="text"]:focus {
        outline: none;
        border-color: var(--primary-2);
        background: rgba(255, 255, 255, 0.08);
      }

      .btn {
        -webkit-appearance: none;
        appearance: none;
        border: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        justify-content: center;
        padding: 14px 22px;
        font-weight: 600;
        font-size: 15px;
        border-radius: 12px;
        color: white;
        background: linear-gradient(90deg, var(--primary-1), var(--primary-2));
        box-shadow:
          0 8px 30px rgba(6, 11, 23, 0.6),
          inset 0 -2px 10px rgba(0, 0, 0, 0.18);
        transition:
          transform 0.18s cubic-bezier(0.2, 0.9, 0.4, 1),
          box-shadow 0.18s;
        will-change: transform;
      }

      .btn:enabled:active {
        transform: translateY(1px) scale(0.998);
      }

      .btn:enabled:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 50px rgba(6, 11, 23, 0.65);
      }

      .btn .icon {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        box-shadow: 0 4px 12px rgba(2, 6, 23, 0.45);
        flex-shrink: 0;
      }

      .muted {
        color: rgba(230, 238, 248, 0.5);
        font-size: 12px;
      }

      @media (max-width: 420px) {
        .card {
          padding: 28px;
        }

        .btn {
          width: 100%;
          padding: 14px;
          font-size: 15px;
        }
      }
    </style>
  </head>

  <body>
    <main class="card" role="main" aria-labelledby="title">
      <h1 id="title">Autotag Artist</h1>
      <p class="lead">
        Automatically set artist tags based on already tagged items
      </p>

      <!-- テキスト入力欄 -->
      <input
        type="text"
        id="artistInput"
        placeholder="TagGroup Name of artist tags"
        value="Artist"
      />

      <!-- ボタン -->
      <button class="btn" id="autotag" aria-label="Autotag Artist">
        <span class="icon" aria-hidden="true">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M3 12l7-7 9 9-7 7L3 12z"
              fill="white"
              fill-opacity="0.95"
            />
            <circle cx="9.5" cy="9.5" r="1.5" fill="#0b1220" />
          </svg>
        </span>
        Autotag Artist
      </button>

      <p class="muted" id="status"></p>
    </main>
    <script type="text/javascript" src="js/plugin.js"></script>
  </body>
</html>
